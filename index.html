.cq-flama.on{filter:none;opacity:1;}
.cq-racha-num{display:flex;flex-direction:column;line-height:1;}
.cq-racha-num strong{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:1.9rem;}
.cq-racha-num small{font-size:.72rem;color:rgba(255,255,255,.65);}
.cq-racha-7{display:flex;gap:6px;flex:1;justify-content:center;}
.cq-racha-dot{width:28px;height:34px;border-radius:8px;background:rgba(255,255,255,.08);display:grid;place-items:center;border:1px solid transparent;}
.cq-racha-dot span{font-size:.68rem;color:rgba(255,255,255,.45);font-weight:700;}
.cq-racha-dot.on{background:var(--accent);}
.cq-racha-dot.on span{color:#fff;}
.cq-racha-dot.hoy{border-color:rgba(255,255,255,.5);}
.cq-racha-side{display:flex;align-items:center;gap:14px;}
.cq-racha-meta{display:flex;flex-direction:column;gap:2px;font-size:.74rem;color:rgba(255,255,255,.7);}
.cq-racha-meta strong{color:#fff;}
.cq-racha-btn{display:inline-flex;align-items:center;gap:6px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-weight:700;font-size:.8rem;padding:9px 13px;cursor:pointer;white-space:nowrap;}
.cq-racha-btn:hover{filter:brightness(.95);}
.cq-card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;}

/* hero */
.cq-hero{display:grid;grid-template-columns:1.1fr 1fr;gap:0;background:var(--card);border:1px solid var(--line);border-radius:18px;overflow:hidden;}
.cq-hero-left{padding:22px;background:linear-gradient(160deg,#163A3C,#0F2B2C);color:#fff;}
.cq-stamp-label{font-size:.78rem;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.6);}
.cq-stamp{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:2.6rem;line-height:1.05;margin-top:4px;letter-spacing:-.02em;}
.cq-stamp.neg{color:#F2A58E;}
.cq-arrastre{display:flex;align-items:center;gap:6px;font-size:.78rem;color:rgba(255,255,255,.78);margin-top:8px;}
.cq-arrastre strong{color:#fff;}
.cq-bar{margin-top:16px;}
.cq-bar-track{height:8px;border-radius:99px;background:rgba(255,255,255,.15);overflow:hidden;}
.cq-bar-fill{height:100%;background:var(--accent);border-radius:99px;transition:width .4s;}
.cq-bar-fill.full{background:#F2A58E;}
.cq-bar span{display:block;font-size:.72rem;color:rgba(255,255,255,.7);margin-top:7px;}
.cq-hero-right{padding:22px;display:flex;flex-direction:column;gap:16px;}

.cq-field{display:flex;flex-direction:column;gap:5px;}
.cq-field>span{font-size:.76rem;font-weight:600;color:var(--ink2);}
.cq-field .opt{font-weight:400;color:var(--muted);font-style:normal;}
.cq-field small{font-size:.7rem;color:var(--muted);}
.cq-field input,.cq-field select,.cq-field textarea{font-family:inherit;font-size:.92rem;color:var(--ink);background:#fff;border:1px solid var(--line);border-radius:10px;padding:9px 11px;width:100%;outline:none;transition:.15s;}
.cq-field input:focus,.cq-field select:focus,.cq-field textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(181,135,46,.12);}
.cq-field textarea{resize:vertical;}
.cq-money-in{position:relative;display:flex;align-items:center;}
.cq-money-in em{position:absolute;left:11px;font-style:normal;color:var(--muted);font-weight:600;}
.cq-money-in input{padding-left:24px;font-weight:600;}
.cq-sueldo input{font-size:1.25rem;font-weight:700;}

.cq-mini-grid{display:flex;flex-direction:column;gap:9px;}
.cq-mini{display:flex;align-items:center;gap:10px;padding:11px 13px;border-radius:11px;border:1px solid var(--line);}
.cq-mini div{display:flex;flex-direction:column;line-height:1.2;}
.cq-mini span{font-size:.72rem;color:var(--muted);}
.cq-mini strong{font-size:1.05rem;font-weight:700;}
.cq-mini.pos{background:var(--pos-bg);border-color:#CFE5D8;color:var(--pos);}
.cq-mini.neg{background:var(--neg-bg);border-color:#EBD2C7;color:var(--neg);}
.cq-mini.extra{background:#FBF3E3;border-color:#EBDCBB;color:var(--accent);}

/* formulario */
.cq-form-head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap;}
.cq-toggle{display:flex;gap:4px;background:#F2EFE7;padding:4px;border-radius:11px;}
.cq-toggle button{display:flex;align-items:center;gap:5px;border:none;background:transparent;font-weight:600;font-size:.82rem;color:var(--muted);padding:7px 13px;border-radius:8px;cursor:pointer;}
.cq-toggle button.on.egreso{background:var(--neg);color:#fff;}
.cq-toggle button.on.ingreso{background:var(--pos);color:#fff;}
.cq-toggle button.on.traspaso{background:var(--ink2);color:#fff;}
.cq-form-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px;}
.cq-field-wide{grid-column:1 / -1;}
.cq-file-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.cq-file-btn{display:inline-flex;align-items:center;gap:6px;font-size:.82rem;font-weight:600;color:var(--ink2);background:#fff;border:1px dashed var(--line);border-radius:10px;padding:9px 13px;cursor:pointer;}
.cq-file-btn:hover{border-color:var(--accent);color:var(--accent);}
.cq-file-tag{display:inline-flex;align-items:center;gap:4px;font-size:.74rem;color:var(--pos);font-weight:600;}
.cq-file-prev{height:42px;border-radius:8px;border:1px solid var(--line);}
.cq-form-foot{display:flex;justify-content:flex-end;gap:9px;margin-top:16px;}
.cq-primary{display:inline-flex;align-items:center;gap:7px;background:var(--accent);color:#fff;border:none;border-radius:11px;font-weight:700;font-size:.9rem;padding:11px 18px;cursor:pointer;transition:.15s;}
.cq-primary:hover{filter:brightness(.95);}

/* lista */
.cq-list-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;}
.cq-list-head h3{font-size:1.05rem;}
.cq-list-head span{font-size:.78rem;color:var(--muted);}
.cq-day{margin-top:14px;}
.cq-day-head{display:flex;align-items:center;gap:9px;padding-bottom:8px;border-bottom:1px solid var(--line);margin-bottom:4px;}
.cq-day-num{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:1.15rem;color:var(--ink);min-width:26px;}
.cq-day-sem{font-size:.76rem;color:var(--muted);text-transform:capitalize;flex:1;}
.cq-day-sub{font-weight:700;font-size:.9rem;}
.cq-day-sub.pos{color:var(--pos);} .cq-day-sub.neg{color:var(--neg);}
.cq-mov{display:flex;align-items:flex-start;gap:11px;padding:11px 4px;border-bottom:1px dashed var(--line);}
.cq-mov:last-child{border-bottom:none;}
.cq-mov-dot{width:8px;height:8px;border-radius:99px;margin-top:6px;flex-shrink:0;}
.cq-mov.egreso .cq-mov-dot{background:var(--neg);} .cq-mov.ingreso .cq-mov-dot{background:var(--pos);}
.cq-mov.traspaso .cq-mov-dot{background:var(--ink2);}
.cq-mov.traspaso .cq-mov-monto{color:var(--ink2);}
.cq-mov-body{flex:1;min-width:0;}
.cq-mov-top{display:flex;justify-content:space-between;gap:10px;align-items:baseline;}
.cq-mov-concepto{font-weight:600;font-size:.92rem;}
.cq-mov-monto{font-weight:700;font-size:.95rem;white-space:nowrap;}
.cq-mov-monto.egreso{color:var(--neg);} .cq-mov-monto.ingreso{color:var(--pos);}
.cq-mov-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:4px;}
.cq-chip{font-size:.7rem;font-weight:600;color:var(--ink2);background:#F2EFE7;border-radius:99px;padding:2px 9px;}
.cq-chip.cuenta{background:#EAF1ED;color:var(--ink);}
.cq-ref{font-size:.78rem;color:var(--muted);}
.cq-link{display:inline-flex;align-items:center;gap:4px;font-size:.74rem;font-weight:600;color:var(--accent);background:none;border:none;cursor:pointer;padding:0;}
.cq-mov-actions{display:flex;gap:3px;}
.cq-mov-actions button{width:30px;height:30px;border-radius:8px;border:1px solid transparent;background:transparent;color:var(--muted);cursor:pointer;display:grid;place-items:center;}
.cq-mov-actions button:hover{background:#F2EFE7;color:var(--ink);}

/* desglose */
.cq-desglose-grid{display:grid;grid-template-columns:220px 1fr;gap:18px;align-items:center;margin-top:12px;}
.cq-leyenda{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:8px;}
.cq-leyenda li{display:grid;grid-template-columns:14px 1fr auto auto;align-items:center;gap:9px;font-size:.86rem;}
.cq-leyenda .dot{width:11px;height:11px;border-radius:3px;}
.cq-leyenda .nm{color:var(--ink2);}
.cq-leyenda .vl{font-weight:700;font-variant-numeric:tabular-nums;}
.cq-leyenda .pc{color:var(--muted);font-size:.76rem;min-width:34px;text-align:right;}

/* ahorro */
.cq-ahorro{display:flex;flex-direction:column;gap:16px;background:linear-gradient(150deg,#FBF7EE,#FFFFFF);}
.cq-ahorro-acum{display:flex;align-items:center;gap:14px;}
.cq-ahorro-ic{width:46px;height:46px;border-radius:13px;background:var(--accent);color:#fff;display:grid;place-items:center;flex-shrink:0;}
.cq-ahorro-info{display:flex;flex-direction:column;line-height:1.2;}
.cq-ahorro-info>span{font-size:.76rem;color:var(--muted);font-weight:600;}
.cq-ahorro-info>strong{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:1.7rem;letter-spacing:-.02em;color:var(--accent);font-variant-numeric:tabular-nums;}
.cq-ahorro-info>strong.neg{color:var(--neg);}
.cq-ahorro-info>small{font-size:.72rem;color:var(--muted);margin-top:2px;}
.cq-ahorro-fields{display:grid;grid-template-columns:1fr 1fr;gap:13px;}
.cq-warn{font-size:.78rem;color:var(--neg);background:var(--neg-bg);border:1px solid #EBD2C7;border-radius:10px;padding:9px 12px;}
.cq-inicial-row{display:flex;gap:12px;flex-wrap:wrap;}
.cq-inicial{min-width:150px;flex:1;}

/* meta de ahorro */
.cq-meta{display:flex;flex-direction:column;gap:8px;padding:14px;border:1px solid var(--line);border-radius:12px;background:#fff;}
.cq-meta-head{display:flex;justify-content:space-between;align-items:flex-end;gap:14px;flex-wrap:wrap;}
.cq-meta-field{max-width:200px;flex:1;}
.cq-meta-num{text-align:right;line-height:1.1;}
.cq-meta-num strong{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:1.5rem;color:var(--accent);}
.cq-meta-num small{display:block;font-size:.72rem;color:var(--muted);}
.cq-meta-track{height:10px;border-radius:99px;background:#EFEADB;overflow:hidden;}
.cq-meta-fill{height:100%;background:linear-gradient(90deg,#C9A24A,var(--accent));border-radius:99px;transition:width .4s;}
.cq-meta-fill.done{background:linear-gradient(90deg,#3C8C6E,var(--pos));}

/* mini cajitas */
.cq-mini.caj{background:#EFEAF6;border-color:#DCD0EB;color:#6A5ACD;}
.cq-mini.deben{background:#FBEEE6;border-color:#EAD3C0;color:#B5663B;}

/* préstamos */
.cq-loan{display:flex;flex-direction:column;gap:11px;}
.cq-loan.saldado{opacity:.78;}
.cq-loan-head{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.cq-loan-name{display:flex;align-items:center;gap:8px;font-family:'Bricolage Grotesque',sans-serif;font-size:1.1rem;}
.cq-loan-actions{display:flex;gap:3px;}
.cq-loan-actions button{width:30px;height:30px;border-radius:8px;border:1px solid transparent;background:transparent;color:var(--muted);cursor:pointer;display:grid;place-items:center;}
.cq-loan-actions button:hover{background:#F2EFE7;color:var(--ink);}
.cq-loan-amounts{display:flex;gap:18px;}
.cq-loan-amounts div{display:flex;flex-direction:column;}
.cq-loan-amounts span{font-size:.72rem;color:var(--muted);}
.cq-loan-amounts strong{font-size:1.15rem;font-weight:800;font-family:'Bricolage Grotesque',sans-serif;font-variant-numeric:tabular-nums;}
.cq-loan-amounts .pos{color:var(--pos);} .cq-loan-amounts .neg{color:var(--neg);}
.cq-loan-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.cq-abonos{display:flex;flex-direction:column;gap:6px;border-top:1px dashed var(--line);padding-top:9px;}
.cq-abono{display:flex;align-items:center;gap:8px;font-size:.82rem;color:var(--ink2);}
.cq-abono>span:first-of-type{flex:1;}
.cq-abono button{width:24px;height:24px;border:none;background:transparent;color:var(--muted);cursor:pointer;border-radius:6px;}
.cq-abono button:hover{background:var(--neg-bg);color:var(--neg);}
.cq-abono-form{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;border-top:1px dashed var(--line);padding-top:11px;align-items:end;}
.cq-abono-btns{grid-column:1 / -1;display:flex;justify-content:flex-end;gap:8px;}
.cq-loan-add{align-self:flex-start;}

/* sección cajitas */
.cq-caj-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:12px;}
.cq-caj{border:1px solid var(--line);border-radius:13px;padding:14px;background:linear-gradient(155deg,#FBF7EE,#fff);display:flex;flex-direction:column;gap:8px;}
.cq-caj-top{display:flex;align-items:center;gap:8px;}
.cq-caj-nombre{flex:1;font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:1rem;color:var(--ink);border:1px solid transparent;background:transparent;border-radius:8px;padding:4px 6px;min-width:0;}
.cq-caj-nombre:hover,.cq-caj-nombre:focus{border-color:var(--line);background:#fff;outline:none;}
.cq-caj-del{width:30px;height:30px;border-radius:8px;border:none;background:transparent;color:var(--muted);cursor:pointer;display:grid;place-items:center;flex-shrink:0;}
.cq-caj-del:hover{background:var(--neg-bg);color:var(--neg);}
.cq-caj-saldo{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:1.65rem;letter-spacing:-.02em;color:var(--accent);font-variant-numeric:tabular-nums;}
.cq-caj-saldo.neg{color:var(--neg);}
.cq-caj-rend{font-size:.74rem;color:var(--ink2);display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.cq-caj-rend strong{color:var(--pos);}
.cq-caj-rendtot{color:var(--muted);}
.cq-caj-fields{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px;}
.cq-caj-tasa>span{font-size:.7rem;}
.cq-pct-in{position:relative;display:flex;align-items:center;}
.cq-pct-in input{width:100%;font-family:inherit;font-size:.92rem;font-weight:600;color:var(--ink);background:#fff;border:1px solid var(--line);border-radius:10px;padding:9px 30px 9px 11px;outline:none;}
.cq-pct-in input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(181,135,46,.12);}
.cq-pct-in em{position:absolute;right:9px;color:var(--muted);display:flex;}
.cq-caj-foot{display:flex;align-items:center;gap:14px;margin-top:14px;flex-wrap:wrap;}
.cq-caj-foot .cq-mut{flex:1;min-width:220px;font-size:.74rem;}
.cq-caj-ic{width:36px;text-align:center;font-size:1.1rem;border:1px solid transparent;background:transparent;border-radius:8px;padding:4px 2px;}
.cq-caj-ic:hover,.cq-caj-ic:focus{border-color:var(--line);background:#fff;outline:none;}
.cq-caj-hint{display:block;margin-top:6px;}

/* editor de cuentas (vista anual) */
.cq-nomina{min-width:180px;}
.cq-cuentas-edit{display:flex;flex-direction:column;gap:9px;margin:6px 0 4px;}
.cq-cuenta-edit{display:flex;align-items:center;gap:8px;}
.cq-cuenta-ic-sel{width:54px;font-size:1.05rem;text-align:center;border:1px solid var(--line);border-radius:10px;padding:9px 4px;background:#fff;}
.cq-cuenta-nombre{flex:1;min-width:0;font-family:inherit;font-weight:600;font-size:.92rem;color:var(--ink);border:1px solid var(--line);border-radius:10px;padding:9px 11px;background:#fff;}
.cq-cuenta-saldo{max-width:160px;}
.cq-anio-sub{margin-top:6px;}

/* monto + cuenta */
.cq-money-cuenta{display:flex;gap:8px;flex-wrap:wrap;}
.cq-money-cuenta .cq-money-in{flex:1 1 140px;min-width:0;}
.cq-money-cuenta select{flex:1 1 120px;min-width:0;}

/* cuentas en el resumen */
.cq-cuentas{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap;}
.cq-cuenta{display:flex;align-items:center;gap:9px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.16);border-radius:11px;padding:9px 13px;flex:1 1 130px;min-width:0;}
.cq-cuenta-ic{font-size:1.15rem;}
.cq-cuenta div{display:flex;flex-direction:column;line-height:1.2;}
.cq-cuenta small{font-size:.68rem;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:.04em;}
.cq-cuenta strong{font-size:1.02rem;font-weight:700;font-variant-numeric:tabular-nums;}
.cq-cuenta strong.neg{color:#F2A58E;}
.cq-cuenta-editar{display:inline-flex;align-items:center;justify-content:center;gap:6px;align-self:center;flex:1 1 150px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);color:#fff;border-radius:11px;padding:10px 13px;font-size:.78rem;font-weight:600;cursor:pointer;font-family:inherit;}
.cq-cuenta-editar:hover{background:rgba(255,255,255,.2);}


/* cuadre de caja */
.cq-cuadre-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:12px;}
.cq-cuadre-box{border:1px solid var(--line);border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:10px;}
.cq-cuadre-h{display:flex;align-items:center;gap:8px;font-weight:700;font-size:.92rem;}
.cq-cuadre-row{display:flex;justify-content:space-between;align-items:baseline;font-size:.84rem;color:var(--muted);}
.cq-cuadre-row strong{font-size:1.05rem;color:var(--ink);font-variant-numeric:tabular-nums;}
.cq-cuadre-row strong.neg{color:var(--neg);}
.cq-cuadre-ok{display:flex;align-items:center;gap:6px;font-size:.84rem;font-weight:600;color:var(--pos);background:var(--pos-bg);border-radius:9px;padding:9px 11px;}
.cq-cuadre-dif{display:flex;flex-direction:column;gap:9px;}
.cq-dif{display:flex;flex-direction:column;border-radius:9px;padding:9px 11px;}
.cq-dif strong{font-size:.95rem;}
.cq-dif small{font-size:.72rem;opacity:.85;}
.cq-dif.pos{background:var(--pos-bg);color:var(--pos);}
.cq-dif.neg{background:var(--neg-bg);color:var(--neg);}
.cq-cuadre-dif .cq-ghost{justify-content:center;}

/* vista anual */
.cq-anio-head{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;flex-wrap:wrap;margin-bottom:6px;}
.cq-mut{color:var(--muted);font-size:.8rem;margin:4px 0 0;}
.cq-inicial{min-width:180px;}
.cq-anio-stats{display:flex;gap:24px;flex-wrap:wrap;margin-top:14px;padding-top:14px;border-top:1px solid var(--line);}
.cq-anio-stats div{display:flex;flex-direction:column;}
.cq-anio-stats span{font-size:.76rem;color:var(--muted);}
.cq-anio-stats strong{font-size:1.3rem;font-weight:800;font-family:'Bricolage Grotesque',sans-serif;}
.cq-tabla{display:flex;flex-direction:column;margin-top:10px;}
.cq-tr{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr 1fr;gap:8px;align-items:center;text-align:right;padding:9px 8px;border:none;background:transparent;border-bottom:1px solid var(--line);font-size:.82rem;cursor:pointer;font-family:inherit;color:var(--ink);}
.cq-tr:hover:not(.cq-th){background:#FBF7EE;}
.cq-tr-per{text-align:left;font-weight:600;}
.cq-th{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;cursor:default;font-weight:600;}
.cq-th .cq-tr-per{text-align:left;}
.cq-tr .pos{color:var(--pos);} .cq-tr .neg{color:var(--neg);} .cq-tr .ahr{color:var(--accent);} .cq-tr .b{font-weight:700;}

.cq-empty{text-align:center;color:var(--muted);font-size:.9rem;padding:30px 16px;border:1px dashed var(--line);border-radius:14px;}
.cq-foot{text-align:center;font-size:.72rem;color:var(--muted);margin-top:24px;line-height:1.5;}

/* modal */
.cq-modal{position:fixed;inset:0;background:rgba(15,30,30,.7);display:grid;place-items:center;z-index:50;padding:20px;}
.cq-modal-box{position:relative;max-width:90vw;max-height:88vh;}
.cq-modal-box img{max-width:90vw;max-height:88vh;border-radius:12px;display:block;}
.cq-modal-x{position:absolute;top:-14px;right:-14px;width:34px;height:34px;border-radius:99px;border:none;background:#fff;color:var(--ink);cursor:pointer;display:grid;place-items:center;box-shadow:0 4px 12px rgba(0,0,0,.2);}

@media(max-width:680px){
  .cq-hero{grid-template-columns:1fr;}
  .cq-form-grid{grid-template-columns:1fr;}
  .cq-desglose-grid{grid-template-columns:1fr;}
  .cq-ahorro-fields{grid-template-columns:1fr;}
  .cq-cuadre-grid{grid-template-columns:1fr;}
  .cq-caj-grid{grid-template-columns:1fr;}
  .cq-caj-fields{grid-template-columns:1fr 1fr;}
  .cq-racha{gap:12px;}
  .cq-racha-7{order:3;flex-basis:100%;}
  .cq-abono-form{grid-template-columns:1fr 1fr;}
  .cq-loan-amounts{gap:14px;}
  .cq-stamp{font-size:2.1rem;}
  .cq-tr{grid-template-columns:1fr 1fr;gap:4px 10px;text-align:left;}
  .cq-th{display:none;}
  .cq-tr-per{grid-column:1 / -1;font-size:.9rem;}
}
